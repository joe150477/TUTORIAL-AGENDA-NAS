<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>NAS · Agenda Escolar — Tutorial para padres</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#172E50; --navy-dk:#0F1F3A; --gold:#C9A24B;
  --ink:#1d1d1f; --ink2:#52525b;
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",sans-serif;
  background:linear-gradient(135deg,var(--navy),var(--navy-dk));color:#fff;overflow:hidden;
  -webkit-font-smoothing:antialiased}

.app{height:100dvh;display:flex;flex-direction:column;max-width:580px;margin:0 auto;padding:env(safe-area-inset-top) 14px env(safe-area-inset-bottom)}

.topbar{display:flex;justify-content:space-between;align-items:center;padding:10px 4px 8px;flex-shrink:0;gap:8px}
.step-label{font-size:13px;color:rgba(255,255,255,.7);letter-spacing:.04em;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.controls{display:flex;gap:6px;flex-shrink:0;align-items:center}
.voice-sel{background:rgba(255,255,255,.12);color:#fff;border:none;padding:7px 8px;border-radius:18px;
  font-size:11.5px;font-family:inherit;cursor:pointer;max-width:140px;font-weight:600;
  appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 12'><path fill='%23fff' d='M2 4l4 4 4-4'/></svg>");
  background-repeat:no-repeat;background-position:right 8px center;padding-right:24px}
.voice-sel option{background:#1a1a2e;color:#fff}
.btn-mini{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.12);border:none;
  color:#fff;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.btn-mini.active{background:var(--gold);color:var(--navy-dk)}

.progress{height:3px;background:rgba(255,255,255,.12);border-radius:2px;overflow:hidden;margin:0 4px 10px;flex-shrink:0}
.progress-f{height:100%;background:linear-gradient(90deg,var(--gold),#38bdf8);border-radius:2px;transition:width .4s ease}

.now-speaking{display:none;align-items:center;gap:6px;padding:5px 11px;
  background:rgba(201,162,75,.18);border-radius:99px;font-size:11px;color:var(--gold);
  font-weight:600;margin:0 auto 8px;width:fit-content;flex-shrink:0}
.now-speaking.show{display:flex}
.now-speaking::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--gold);
  animation:pulse 1.2s infinite}
.now-speaking.tap-hint{display:flex;background:rgba(56,189,248,.18);color:#7dd3fc}
.now-speaking.tap-hint::before{animation:none;background:#7dd3fc}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  overflow-y:auto;padding:6px 0;min-height:0;width:100%}

.slide-title{font-size:22px;font-weight:700;text-align:center;line-height:1.22;margin:0 8px 4px;
  text-shadow:0 1px 8px rgba(0,0,0,.2)}
.slide-title b{color:var(--gold)}
.slide-sub{font-size:13.5px;text-align:center;color:rgba(255,255,255,.85);line-height:1.5;
  margin:0 16px 16px;max-width:420px}
.slide-sub b{color:#fff;font-weight:600}

/* v3: mockup AMPLIADO — ocupa el espacio disponible, no se ve pequeño */
.mockup{background:#fff;border-radius:26px;width:100%;max-width:460px;flex:1;min-height:0;
  box-shadow:0 14px 44px rgba(0,0,0,.42);overflow:hidden;color:var(--ink);
  display:flex;flex-direction:column;animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.m-shield-xl{width:160px;height:192px;margin:auto}
.m-shield-lg{width:110px;height:132px;margin:0 auto 14px}
.m-shield-sm{width:38px;height:46px;flex-shrink:0}

.m-splash{background:linear-gradient(135deg,var(--navy),var(--navy-dk));color:#fff;
  padding:36px 18px;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  border-radius:24px;text-align:center}
.m-splash-title{font-size:22px;font-weight:700;margin-top:26px}
.m-splash-title b{color:var(--gold)}
.m-splash-sub{font-size:14px;opacity:.78;margin-top:8px}
.m-outro-tag{font-size:15px;color:var(--gold);font-style:italic;margin-top:18px;line-height:1.4}

.m-screen{flex:1;display:flex;flex-direction:column;background:#fff}
.m-band{background:linear-gradient(135deg,var(--navy),var(--navy-dk));color:#fff;
  padding:18px 14px;display:flex;align-items:center;gap:10px}
.m-bt{font-size:15px;font-weight:700}
.m-bt b{color:var(--gold)}
.m-tabs{display:flex;background:#f4f4f5;border-radius:12px;padding:4px;margin:18px 18px 14px}
.m-tab{flex:1;text-align:center;padding:9px;font-size:12.5px;font-weight:600;color:#888;border-radius:8px}
.m-tab.active{background:#fff;color:var(--navy);box-shadow:0 1px 3px rgba(0,0,0,.06)}
.m-label{font-size:11.5px;color:#666;font-weight:500;margin:0 18px 5px}
.m-input{background:#fff;border:1px solid #ddd;border-radius:10px;padding:11px 13px;margin:0 18px 15px;
  font-family:monospace;font-size:14px;color:var(--ink)}
.m-btn{background:var(--navy);color:#fff;text-align:center;padding:13px;border-radius:10px;
  margin:0 18px 18px;font-size:14px;font-weight:600}

.m-cal-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:2px;background:#e5e5e5}
.m-cell{background:#fff;min-height:60px;padding:5px;font-size:10px;display:flex;flex-direction:column;gap:2px}
.m-cell.sel{background:#FFFBEB}
.m-dn{font-size:12px;font-weight:600;color:var(--ink)}
.m-today{background:#d72c2e;color:#fff;width:22px;height:22px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600}
.m-pill{color:#fff;font-size:8.5px;font-weight:700;padding:2px 4px;border-radius:3px;letter-spacing:.02em;text-transform:uppercase}

.m-day-h{padding:16px 18px;font-size:17px;font-weight:700;color:var(--navy);border-bottom:1px solid #eee}
.m-class{margin:10px 18px;border-radius:11px;padding:12px 13px;border-left:4px solid;background:#EAF2FB}
.m-class.blue{border-color:#185FA5;background:#EAF2FB}
.m-class.red{border-color:#A32D2D;background:#FBEAEA}
.m-class.green{border-color:#3B6D11;background:#ECF5DE}
.m-cs{font-size:12.5px;font-weight:800;letter-spacing:.02em}
.m-class.blue .m-cs{color:#185FA5}
.m-class.red .m-cs{color:#A32D2D}
.m-class.green .m-cs{color:#3B6D11}
.m-ct{font-size:12.5px;color:var(--ink);margin-top:3px}
.m-check{display:inline-block;font-size:11.5px;padding:4px 10px;border-radius:99px;margin-top:8px;font-weight:600}
.m-check.done{background:#185FA5;color:#fff}
.m-class.red .m-check.done{background:#A32D2D}

.m-ruta-t{padding:18px 18px 4px;font-size:14px;font-weight:700;color:var(--navy)}
.m-ruta-c{margin:0 18px;font-size:24px;font-weight:800;color:var(--navy)}
.m-bar{height:6px;background:rgba(0,0,0,.06);border-radius:99px;margin:7px 18px;overflow:hidden}
.m-bar-f{height:100%;width:60%;background:linear-gradient(90deg,var(--gold),#38bdf8,#22c55e);border-radius:99px}
.m-msg{font-size:11.5px;color:#666;margin:6px 18px 10px;font-weight:500}

.m-news{padding:20px 18px;background:#fff;border-radius:24px;flex:1;display:flex;flex-direction:column}
.m-news-h{font-size:16px;font-weight:700;color:var(--navy);margin-bottom:14px}
.m-news-card{background:#FFF7ED;border-left:5px solid #D97706;padding:14px;border-radius:10px;margin-bottom:16px}
.m-news-type{font-size:10px;font-weight:700;color:#78350F;letter-spacing:.04em;text-transform:uppercase;
  background:#fff;display:inline-block;padding:2px 7px;border-radius:4px;margin-bottom:7px}
.m-news-title{font-size:15px;font-weight:700;color:var(--navy);line-height:1.22}
.m-news-body{font-size:12.5px;color:var(--ink);margin-top:6px;line-height:1.45}
.m-news-btn{background:var(--navy);color:#fff;text-align:center;padding:12px;border-radius:12px;font-size:13.5px;font-weight:600;margin-top:auto}

.m-chip{margin:14px 18px;display:inline-flex;align-items:center;gap:6px;background:rgba(0,122,255,.12);
  border:1px solid rgba(0,122,255,.25);color:#1f4d8a;padding:7px 12px;border-radius:99px;font-size:12.5px;font-weight:700}
.m-badge{background:var(--navy);color:#fff;font-size:10px;font-weight:700;padding:1px 7px;border-radius:99px;margin-left:4px}
.m-menu{margin:12px 18px;background:#fff;border-radius:14px;box-shadow:0 6px 22px rgba(0,0,0,.13);padding:5px}
.m-mi{padding:10px 12px;font-size:13.5px;color:var(--ink);font-weight:600;border-radius:8px}
.m-mi.active{background:rgba(0,122,255,.08)}
.m-mi.add{background:rgba(0,122,255,.06);border:1px dashed rgba(0,122,255,.4);color:#185FA5;text-align:center;margin-top:6px}

.m-install{padding:26px 20px;background:#fff;border-radius:24px;flex:1;display:flex;flex-direction:column;gap:16px;justify-content:center}
.m-install-row{display:flex;gap:14px;align-items:center;padding:14px;background:#f4f4f5;border-radius:13px}
.m-install-icon{font-size:38px}
.m-install-t{font-size:14.5px;font-weight:700;color:var(--navy)}
.m-install-s{font-size:12.5px;color:#666;margin-top:4px;line-height:1.4}
.m-install-foot{font-size:12px;color:#888;text-align:center;font-style:italic}

.m-support{padding:42px 22px;background:#fff;border-radius:24px;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:10px}
.m-support-icon{font-size:68px}
.m-support-t{font-size:15px;font-weight:600;color:var(--ink2);margin-top:10px}
.m-support-p{font-size:26px;font-weight:800;color:var(--navy);font-family:monospace;letter-spacing:.5px}
.m-support-s{font-size:13px;color:#666;margin-top:8px}

.nav{padding:16px 4px 4px;display:flex;gap:10px;flex-shrink:0}
.nav-btn{flex:1;padding:14px;border-radius:14px;border:none;font-size:15.5px;font-weight:600;
  font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;
  transition:transform .1s,opacity .15s}
.nav-btn:active{transform:scale(.96)}
.nav-btn.prev{background:rgba(255,255,255,.12);color:#fff}
.nav-btn.prev:disabled{opacity:.35}
.nav-btn.next{background:var(--gold);color:var(--navy-dk);box-shadow:0 4px 14px rgba(201,162,75,.32)}
.nav-btn.restart{background:rgba(255,255,255,.18);color:#fff;box-shadow:none}

.dots{display:flex;gap:5px;justify-content:center;padding:4px 0 4px;flex-shrink:0}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.25)}
.dot.active{background:var(--gold);width:20px;border-radius:3px}
.dot.done{background:rgba(255,255,255,.5)}

}

let current = 0;
let voiceOn = true;
let currentUtter = null;
let availableVoices = [];
let selectedVoice = null;
let audioUnlocked = false; // iOS Safari requiere gesto de usuario antes de poder hablar

const stage = document.getElementById("stage");
const stepLabel = document.getElementById("step-label");
const progressF = document.getElementById("progress-f");
const dotsEl = document.getElementById("dots");
const btnPrev = document.getElementById("btn-prev");
const btnNext = document.getElementById("btn-next");
const btnVoice = document.getElementById("btn-voice");
const btnRestart = document.getElementById("btn-restart");
const nowSpeaking = document.getElementById("now-speaking");
const voiceSel = document.getElementById("voice-sel");

// Prioridad de voces: latinoamericanas primero, España al final
const VOICE_PRIORITY = ["es-MX","es-US","es-CO","es-AR","es-CL","es-PE","es-VE","es-EC","es-UY","es-PY","es-BO","es-CR","es-PA","es-DO","es-GT","es-HN","es-NI","es-SV","es-PR","es-419","es-LA"];
const VOICE_LAST_RESORT = ["es-ES","es"];

// Nombres de voces conocidas con timbre latino/cálido (Google, Microsoft, Apple)
const LATINA_NAME_HINTS = [
  "mexic","méxic","colombi","latin","united states","estados unidos",
  "paulina","juan","sabina","raul","raúl","dalia","hilda","esperanza",
  "carlos","diego","valeria","camila","sofía","sofia","mónica","monica",
  "lucía","lucia","gabriela","andrés","andres","santiago"
];
const SPAIN_NAME_HINTS = ["spain","españa","de españa","jorge","helena (es-es)","laia","elvira","conchita"];

function scoreVoiceWarmth(v){
  const n = (v.name||"").toLowerCase();
  const l = (v.lang||"").toLowerCase();
  // Penalizar explícitamente voces de España
  if (l.startsWith("es-es") || SPAIN_NAME_HINTS.some(h => n.includes(h))) return -1;
  let score = 0;
  if (LATINA_NAME_HINTS.some(h => n.includes(h))) score += 3;
  // Las voces "neural", "natural", "online", "premium" suelen sonar menos robotizadas
  if (n.includes("neural") || n.includes("natural") || n.includes("online") || n.includes("wavenet") || n.includes("premium")) score += 2;
  // Google y Microsoft suelen tener mejores motores que voces locales genéricas (eSpeak, etc.)
  if (n.includes("google") || n.includes("microsoft")) score += 1;
  return score;
}

function pickBestVoice(voices){
  // Excluir explícitamente voces de España de toda la selección
  const noSpain = voices.filter(v => scoreVoiceWarmth(v) >= 0);
  const pool = noSpain.length ? noSpain : voices;

  // 1) Entre las no-España, elegir la de mejor puntuación (nombre cálido/latino + motor de calidad)
  //    desempatando por la prioridad de códigos de idioma latinoamericanos
  let best = null, bestScore = -Infinity;
  for (const v of pool) {
    const l = (v.lang||"").toLowerCase();
    const langIdx = VOICE_PRIORITY.findIndex(p => p.toLowerCase() === l);
    const langBonus = langIdx >= 0 ? (VOICE_PRIORITY.length - langIdx) * 0.1 : 0;
    const total = scoreVoiceWarmth(v) + langBonus;
    if (total > bestScore) { bestScore = total; best = v; }
  }
  if (best && bestScore > 0) return best;

  // 2) Si nada destacó por nombre, ir por código de idioma latino en orden de prioridad
  for (const lang of VOICE_PRIORITY) {
    const v = pool.find(x => x.lang && x.lang.toLowerCase() === lang.toLowerCase());
    if (v) return v;
  }
  // 3) cualquier española como último recurso
  for (const lang of VOICE_LAST_RESORT) {
    const v = voices.find(x => x.lang && x.lang.toLowerCase().startsWith(lang.toLowerCase()));
    if (v) return v;
  }
  return pool[0] || voices[0] || null;
}

function loadVoices(){
  availableVoices = speechSynthesis.getVoices().filter(v =>
    (v.lang && v.lang.toLowerCase().startsWith("es")) ||
    (v.name||"").toLowerCase().includes("spanish") ||
    (v.name||"").toLowerCase().includes("español")
  );
  if (availableVoices.length === 0) return;
  // Ordenar: primero por puntuación de calidez (nombre + motor), luego por prioridad de idioma
  availableVoices.sort((a,b) => {
    const sa = scoreVoiceWarmth(a), sb = scoreVoiceWarmth(b);
    if (sb !== sa) return sb - sa;
    const la = (a.lang||"").toLowerCase(), lb = (b.lang||"").toLowerCase();
    const ia = VOICE_PRIORITY.findIndex(p => p.toLowerCase() === la);
    const ib = VOICE_PRIORITY.findIndex(p => p.toLowerCase() === lb);
    const pa = ia >= 0 ? ia : (la === "es-es" ? 999 : 500);
    const pb = ib >= 0 ? ib : (lb === "es-es" ? 999 : 500);
    return pa - pb;
  });
  // Llenar selector
  voiceSel.innerHTML = availableVoices.map((v,i) => {
    const country = (v.lang||"").split("-")[1] || "";
    const label = (v.name||"Voz") + (country ? " ("+country+")" : "");
    return `<option value="${i}">${label}</option>`;
  }).join("");
  // Pick default
  if (!selectedVoice) {
    selectedVoice = pickBestVoice(availableVoices);
    if (selectedVoice) {
      const idx = availableVoices.indexOf(selectedVoice);
      if (idx >= 0) voiceSel.value = idx;
    }
  }
}

voiceSel.addEventListener("change", () => {
  selectedVoice = availableVoices[parseInt(voiceSel.value)];
  if (voiceOn) speak(NARRATIONS[current]);
});

function speak(text){
  if(!voiceOn || !("speechSynthesis" in window)) return;
  if(currentUtter) speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "es-MX";  // hint para que prefiera latina si no hay voz seleccionada
  u.rate = 0.92;     // un poco más pausado = suena más cálido, menos apurado/robótico
  u.pitch = 1.04;    // levemente más cálido sin sonar artificial
  u.volume = 1;
  if (selectedVoice) {
    u.voice = selectedVoice;
    u.lang = selectedVoice.lang;
  }
  u.onstart = () => nowSpeaking.classList.add("show");
  u.onend = () => nowSpeaking.classList.remove("show");
  u.onerror = () => nowSpeaking.classList.remove("show");
  currentUtter = u;
  speechSynthesis.speak(u);
}

function renderDots(){
  dotsEl.innerHTML = SLIDES.map((_,i) => {
    let cls = "dot";
    if (i === current) cls += " active";
    else if (i < current) cls += " done";
    return `<span class="${cls}"></span>`;
  }).join("");
}

function render(){
  const s = SLIDES[current];
  stepLabel.textContent = s.step;
  progressF.style.width = ((current + 1) / SLIDES.length * 100) + "%";
  renderDots();

  stage.innerHTML = `
    <h1 class="slide-title">${s.title}</h1>
    <div class="slide-sub">${s.subtitle}</div>
    <div class="mockup">${MOCKUPS[s.kind] || ""}</div>
  `;

  btnPrev.disabled = (current === 0);
  if(current === SLIDES.length - 1) {
    btnNext.textContent = "Reiniciar ↺";
    btnNext.classList.add("restart");
  } else {
    btnNext.textContent = "Siguiente →";
    btnNext.classList.remove("restart");
  }

  // Solo narramos automáticamente si el audio ya fue desbloqueado por un
  // gesto del usuario (iOS bloquea en silencio cualquier intento previo).
  if(audioUnlocked){
    nowSpeaking.classList.remove("tap-hint");
    speak(NARRATIONS[current]);
  } else if(voiceOn && "speechSynthesis" in window){
    nowSpeaking.textContent = "👆 Toca la pantalla para activar la voz";
    nowSpeaking.classList.add("show","tap-hint");
  }
}

btnNext.addEventListener("click", () => {
  if(current === SLIDES.length - 1) current = 0;
  else current++;
  render();
});

btnPrev.addEventListener("click", () => {
  if(current > 0){ current--; render(); }
});

btnRestart.addEventListener("click", () => { current = 0; render(); });

btnVoice.addEventListener("click", () => {
  voiceOn = !voiceOn;
  btnVoice.classList.toggle("active", voiceOn);
  btnVoice.textContent = voiceOn ? "🔊" : "🔇";
  if(!voiceOn && currentUtter) speechSynthesis.cancel();
  if(voiceOn) speak(NARRATIONS[current]);
});

if("speechSynthesis" in window){
  loadVoices();
  speechSynthesis.onvoiceschanged = () => {
    loadVoices();
  };
}

// --- Desbloqueo de audio para iOS Safari / Android Chrome ---
// iOS exige que speechSynthesis.speak() se invoque DENTRO del mismo gesto
// de usuario (click/touchend), y solo "desbloquea" el motor la primera vez
// que eso ocurre con éxito. Por eso no podemos disparar speak() automático
// al cargar la página (eso queda bloqueado en silencio en iPhone).
//
// Usamos fase de "captura" en el document, que se ejecuta ANTES que los
// listeners normales de los botones (btnNext, etc.), así garantizamos que
// audioUnlocked ya es true cuando render() intente narrar.
function unlockAudioOnce(){
  if(audioUnlocked) return;
  if(!("speechSynthesis" in window)) return;
  audioUnlocked = true;
  nowSpeaking.textContent = "Hablando…";
  nowSpeaking.classList.remove("tap-hint","show");
  try{ speechSynthesis.resume(); }catch(e){}
}

document.addEventListener("touchend", unlockAudioOnce, { capture: true, once: true });
document.addEventListener("click", unlockAudioOnce, { capture: true, once: true });

render();
</script>
